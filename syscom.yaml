            type: integer
      tags:
        - Productos
      responses:
        '200':
          description: Detalles de producto.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductoDetalle'
              
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /productos/{id}/relacionados:
    get:
      description: |
        Devuelve los productos que se encontraron con los filtros aplicados.
      operationId: Buscar productos relacionados
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      tags:
        - Productos
      responses:
        '200':
          description: Listado de productos relacionados.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Producto'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /productos/{id}/accesorios:
    get:
      description: |
        Devuelve los productos que se encontraron con los filtros aplicados.
      operationId: Buscar accesorios de producto
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      tags:
        - Productos
      responses:
        '200':
          description: Listado de accesorios del producto.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Producto'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /tipocambio:
    get:
      description: |
        Devuelve tipo de cambio en USD o MXN.
      operationId: Obtener tipo de cambio
      tags:
        - Utilidades
      responses:
        '200':
          content:
            application/json:
              example:
                normal: "1.00"
                un_dia: "1.00"
                una_semana: "1.00"
                dos_semanas: "1.00"
                tres_semanas: "1.00"
                un_mes: "1.00"
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
components:
  securitySchemes:
    oauthsyscom:
      type: oauth2
      description: Esta API utiliza OAuth 2.0 con el flujo credenciales de cliente ([más información](https://developers.syscom.mx/guide)).
      flows:
        clientCredentials:
          tokenUrl: https://developers.syscom.mx/oauth/token
          refreshUrl: N/A
          scopes: []

    bearerAuth:
      description: "Utilice su access token obtenido vía OAuth2 en los headers de todas sus peticiones: <code>Authorization: Bearer TU_ACCESS_TOKEN</code>"
      type: http
      scheme: bearer
      bearerFormat: JWT  # optional, for documentation purposes only

  schemas:
    Categoría:
      allOf:
        - required:
          - id
          - nombre
          - nivel
          properties:
            id:
              type: integer
              format: int64
            nombre:
              type: string
            nivel:
              type: integer
              enum: [1, 2, 3]

    CategoríaDetalle:
      allOf:
        - $ref: '#/components/schemas/Categoría'
        - type: object
          properties:
            origen:
              description: Listado de categorías de origen.
              type: object
            subcategorías:
              description: Listado de subcategorías en las que se divide la categoría.
              type: array
              items:
                $ref: '#/components/schemas/Categoría'

    ListaNueva:
      required:
        - nombre
        - productos
      properties:
        nombre:
          type: string
          minimum: 10
          maximum: 255
        productos:
          type: array
          items:
            type: integer  
          minimum: 1
          
    Producto:
      required:
        - producto_id
        - modelo
        - total_existencia
      properties:
        producto_id:
          type: integer
        modelo:
          type: string
        total_existencia:
          type: integer
        titulo:
          type: string
        marca:
          type: string
        sat_key:
          type: string
          description: Código SAT para el producto.
        img_portada:
          type: string
          description: URL de imagen del producto.
        categorías:
          type: array
          items:
            $ref: '#/components/schemas/Categoría'
        marca_logo:
          type: string
          description: URL de logo de la marca.
        link:
          type: string
          description: Link del producto en SYSCOM.
        precios:
          type: object
          description: El objecto incluye el precio de lista y precios con descuentos.
          properties:
            precio_lista:
              type: number
              format: float
              description: Precio de lista del producto.
            precio_especial:
              type: number
              format: float
              description: Precio de promoción del producto.
            precio_descuentos:
              type: number
              format: float
              description: Su precio con descuentos.
    ProductoCarrito:
      required:
        - id
        - tipo
        - cantidad
      properties:
        producto_id:
          type: integer
        tipo:
          type: string
          enum: [1, 2, 3]
        cantidad:
          type: integer
    ProductoDetalle:
      allOf:
        - $ref: '#/components/schemas/Producto'
        - type: object
          properties:
            existencia:
              type: object
              description: Detalle de existencias por sucursal SYSCOM.
            iconos:
              description: Íconos de características del producto.
              type: object
              properties:
                inf_izq:
                  description: Ícono esquina inferior izquierda.
                  type: string
                inf_der:
                  description: Ícono esquina inferior derecha.
                  type: string
                sup_izq:
                  description: Ícono esquina superior izquierda.
                  type: string
                sup_der:
                  description: Ícono esquina superior derecha.
                  type: string
            caracteristicas:
              description: Características destacadas del producto.
              type: array
              items:
                type: string
            imagenes:
              description: Imágenes adicionales del producto.
              type: array
              items:
                type: object
                properties:
                  orden:
                    type: integer
                    description: Orden sugerido de la imagen.
                  url:
                    type: string
                    description: URL de la imagen.
            descripcion:
              type: string
              description: Descripción del producto.
            recursos:
              description: Recursos y manuales del producto.
              type: array
              items:
                type: object
                properties:
                  recurso:
                    description: Nombre del recurso.
                    type: string
                  path:
                    description: URL de descarga del recurso.
                    type: string

    Búsqueda:
      required:
        - cantidad
        - pagina
        - paginas
      properties:
        cantidad:
          description: Cantidad de productos encontrados.
          type: integer
        pagina:
          type: integer
          description: Página actual del listado
        paginas:
          type: integer
          description: Total de páginas de 60 productos encontradas.
        productos:
          description: Productos encontrados página actual.
          type: array
          items:
            $ref: '#/components/schemas/Producto'
            
    Marca:
      required:
        - categorias
        - logo
      properties:
        logo:
          type: string
          description: URL del logo
        titulo:
          type: string
        descripcion: 
          type: string
          description: Descripción de la marca.
        categorias:
          type: array
          items:
            type: object
            properties:
              nombre:
                type: string
              id:
                type: integer
              imagen:
                description: URL de imagen
                type: string
              cantidad:
                type: integer
                description: Cantidad de productos de la marca.
    
    Error:
      required:
        - code
        - title
        - detail
        - status
      properties:
        code:
          type: integer
          format: int32
        title:
          type: string
        detail:
          type: string
        status:
          type: integer
        source:
          type: object

security:
  - bearerAuth: []
