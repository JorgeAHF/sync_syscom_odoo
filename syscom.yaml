openapi: "3.0.0"
info:
  version: 1.0.0
  title: SYSCOM API
  description: API de SYSCOM para buscar productos, crear y ver listas.
  contact:
    name: SYSCOM API Team
servers:
  - url: https://developers.syscom.mx/api/v1

tags:
  - name: Categorías
    description: |
      URL Base: `https://developers.syscom.mx/api/v1/`

      | Método | Operación | Uso  | Devuelve |
      | ------ |:-------------|:-----|---  |
      | GET | /v1/categorias/{id} | Obtener una categoría | categoría  |
      | GET | /v1/categorias | Obtener categorías base | categorías  |
  - name: Carrito
    description: |
      URL Base: `https://developers.syscom.mx/api/v1/`

      | Método | Operación | Uso  | Devuelve |
      | ------ |:-------------|:-----|---  |
      | POST | /v1/carrito/generar | Generar un pedido | carrito  |
      | GET | /v1/carrito/direcciones | Obtener la lista de las direcciones guardadas | lista  |
      | POST | /v1/carrito/direcciones | Inserta una nueva dirección | direccion  |
      | POST | /v1/carrito/direcciones/{id} | Actualiza una dirección | direccion  |
      | DELETE | /v1/carrito/direcciones/{id} | Elimina una dirección | direccion  |
      | GET | /v1/carrito/paises | Obtener la lista de paises validos | lista  |
      | GET | /v1/carrito/estados/{id} | Obtener la lista de estados por código postal | lista  |
      | GET | /v1/carrito/colonias/{id} | Obtener la lista de colonias por código postal | lista  |
      | GET | /v1/carrito/pago | Obtener la lista de formas de pagos disponibles | lista  |
      | GET | /v1/carrito/fleteras| Obtener la lista de fleteras disponibles | lista  |
      | GET | /v1/carrito/sucursales| Obtener la lista de las sucursales disponibles | lista  |
      | GET | /v1/carrito/cfdi| Obtener la lista de uso de CFDI disponibles | lista  |
  - name: Facturas
    description: |
      URL Base: `https://developers.syscom.mx/api/v1/`

      | Método | Operación | Uso  | Devuelve |
      | ------ |:-------------|:-----|---  |
      | GET | /v1/facturas/{id} | Obtener una factura | factura  |
      | GET | /v1/facturas | Obtener una lista de facturas | lista  |
  - name: Marcas
    description: |
      URL Base: `https://developers.syscom.mx/api/v1/`

      | Método | Operación | Uso  | Devuelve |
      | ------ |:-------------|:-----|---  |
      | GET | /v1/marcas/{id} | Obtener una marca | marca  |
      | GET | /v1/marcas/{id}/productos | Obtener productos de una marca | productos  |
      | GET | /v1/marcas | Obtener todas las marcas | marcas  |
  - name: Productos
    description: |
      URL Base: `https://developers.syscom.mx/api/v1/`

      | Método | Operación | Uso  | Devuelve |
      | ------ |:-------------|:-----|---  |
      | GET | /v1/productos/{id} | Obtener un producto | producto  |
      | GET | /v1/productos/{id}/relacionados | Obtener productos relacionados | productos  |
      | GET | /v1/productos/{id}/accesorios | Obtener accesorios de un producto | productos  |
      | GET | /v1/productos | Buscar productos | productos  |
  - name: Utilidades
    description: |
      URL Base: `https://developers.syscom.mx/api/v1/`

      | Método | Operación | Uso  | Devuelve |
      | ------ |:-------------|:-----|---  |
      | GET | /v1/tipocambio | Obtener el tipo de cambio vigente | objecto  |
  - name: Wishlist
    description: |
      URL Base: `https://developers.syscom.mx/api/v1/`

      | Método | Operación | Uso  | Devuelve |
      | ------ |:-------------|:-----|---  |
      | GET | /v1/wishlist/{id} | Obtener una lista | lista  |
      | DELETE | /v1/wishlist/{id} | Eliminar una lista | -  |
      | POST | /v1/wishlist/{id}/productos/{producto_id} | Agregar un producto a una lista | lista  |
      | DELETE | /v1/wishlist/{id}productos/{producto_id} | Eliminar un producto de una lista | -  |
      | GET | /v1/wishlist | Obtener todas las listas | listas  |
paths:
  /categorias:
    get:
      description: |
        Devuelve el nombre e ID de todas las categorías nivel 1.
      tags:
        - Categorías
      operationId: Obtener categorías
      responses:
        '200':
          description: lista de categorías
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Categoría'
              example:
                - id: '22'
                  nombre: Videovigilancia
                  nivel: 1
                - id: '25'
                  nombre: Radiocomunicación
                  nivel: 1
                - id: '26'
                  nombre: Redes
                  nivel: 1
                - id: '27'
                  nombre: GPS, Luces de Emergencia y Transporte
                  nivel: 1
                - id: '30'
                  nombre: Energía
                  nivel: 1
                - id: '32'
                  nombre: Automatización e Intrusión
                  nivel: 1
                - id: '37'
                  nombre: Control de Acceso
                  nivel: 1
                - id: '38'
                  nombre: Detección de Fuego
                  nivel: 1
                - id: '65811'
                  nombre: Cableado Estructurado
                  nivel: 1
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /categorias/{id}:
    get:
      description: Devuelve la información de la categoría. Esto incluye ID, nombre, subcategoría y categorías de origen.
      tags:
        - Categorías
      operationId: Buscar categoría por ID
      parameters:
        - name: ID
          in: path
          description: ID de la categoría
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Detalle de categoría
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoríaDetalle'
              example:
                id: '207'
                nombre: Conectores
                nivel: '2'
                origen:
                - id: '22'
                  nombre: Videovigilancia
                  nivel: '1'
                subcategorías:
                - id: '1295'
                  nombre: Para Alimentación
                  nivel: '3'
                - id: '1299'
                  nombre: RG59 Tipo CaP
                  nivel: '3'
                - id: '1301'
                  nombre: Adaptador a RCA
                  nivel: '3'
                - id: '2294'
                  nombre: Terminadores
                  nivel: '3'
                - id: '2304'
                  nombre: Para Audio
                  nivel: '3'
                - id: '65869'
                  nombre: RG59 / RG6 / RG11
                  nivel: '3'
                - id: '65917'
                  nombre: Para Redes RJ45
                  nivel: '3'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /carrito/generar:
    post:
      description: Genera un pedido a partir de la información de entrega, forma de pago y productos recibidos
      tags:
        - Carrito
      operationId: Generar una orden
      parameters:
        - name: tipo_entrega
          in: query
          description: "Forma en la que se entregará la mercancía"
          required: true
          schema:
            type: string
            enum: [domicilio, sucursal]
        - name: direccion
          in: query
          description: "Dirección de entrega de mercancía, ejemplo {'atencion_a':'sucursal','chihuahua'}"
          required: true
          schema:
            type: object
            enum: [ID dirección guardada, Objeto Dirección, atención_a + Código sucursal]
        - name: metodo_pago
          in: query
          description: ID del metodo de pago 
          required: true
          schema:
            type: string
        - name: productos
          in: query
          description: Arreglo de productos {id:id, tipo:'nuevo,a,b,c,d,e', cantidad:x}
          required: true
          schema:
            $ref: '#/components/schemas/ProductoCarrito'
        - name: moneda
          in: query
          description: "Moneda utilizada en la orden" 
          required: true
          schema:
            type: string
            enum: [mxn, usd]
        - name: uso_cfdi
          in: query
          description: ID del uso de cfdi
          required: true
          schema:
            type: string
        - name: tipo_pago
          in: query
          description: Forma de pago utilizada en la orden
          schema:
            type: string
            default: pue
            enum: [pue,ppd]
        - name: fletera
          in: query
          description: Fletera utilizada al realizar la compra, requiere el código de la sección fletera
          schema:
            type: string
        - name: orden_compra
          in: query
          description: Dato adicional para añadir un folio personalizado a la orden
          schema:
            type: string
        - name: ordenar
          in: query
          description: Determina si el carrito realizará una orden o una cotización (las cotizaciones no apartan mercancía)
          schema:
            type: string
            enum: [true,false]
            default: false
        - name: iva_frontera
          in: query
          description: "Forzar IVA a 8% en zonas fronterizas"
          schema:
            type: boolean
            enum: [true,false]
            default: true
        - name: forzar
          in: query
          description: Permite completar una orden incluso si no hay stock de un producto, el producto sin stock se removerá del pedido final.
          schema:
            type: boolean
            enum: [true, false]
            default: false
        - name: testmode
          in: query
          description: Activa el modo de pruebas, con el cual no se genera ni cotización ni pedido pero sigue el proceso como si se hubiera realizado
          schema:
            type: boolean
            enum: [true, false]
            default: false
        - name: pdf_guia
          in: query
          description: Incluir archivo jpg, png, jpeg, doc, docx, pdf de la guía. Máximo 6mb
          schema:
            type: file
        - name: directo_cliente
          in: query
          description: Activar el envío directo al cliente para no incluir facturas con precios
          schema:
            type: boolean
            enum: [true, false]
            default: false
      responses:
        '200':
          description: Toda la info del pedido
          content:
            aplication/json:
              example:
                cliente: 
                    num_cliente: '104XXXXXX'
                    rfc: 'XEXX010101000'
                    whatsapp: '123456789'
                    email: 'test@correo.com'
                    telefono": '123456789'
                resumen: 
                    peso_total: '6.86'
                    peso_vol_total: '3.0559'
                    moneda: 'MXN'
                    forma_pago: '2'
                    tipo_cambio: '22.73'
                    plazo: '0'
                    codigo_pago: '02'
                    folio: '576-XXXXXX/XX-API'
                    folio_pedido: '576-XXXXXX/XX-API'
                    fecha_creacion: '2022-11-19 00:53:57'

                datos_entrega:
                    calle: 'CALLE'
                    num_exterior: '1234'
                    num_interior: ''
                    colonia: 'COLONIA'
                    ciudad: 'CIUDAD'
                    estado: 'ESTADO'
                    pais: 'PAIS'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /carrito/direcciones:
    get:
      description: Obtiene la lista de direcciones guardadas en la página de SYSCOM
      tags:
        - Carrito
      operationId: Obtener lista de direcciones
      responses:
        '200':
          description: Obtener lista de todas las direcciones en la cuenta
          content:
            aplication/json:
              example:
                - id: "1"
                  atencion_a: "ATENCION A"
                  calle: "CALLE"
                  num_ext: "123"
                  num_int: ""
                  colonia: "COLONIA"
                  codigo_postal: "CP"
                  pais: "PAIS"
                  estado: "ESTADO"
                  ciudad: "CIUDAD"
                  telefono: "123456"
                - id: "2"
                  atencion_a: "ATENCION A"
                  calle: "CALLE"
                  num_ext: "123"
                  num_int: ""
                  colonia: "COLONIA"
                  codigo_postal: "CP"
                  pais: "PAIS"
                  estado: "ESTADO"
                  ciudad: "CIUDAD"
                  telefono: "123456"
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      description: Añade una nueva dirección para uso en el API y la página de SYSCOM utilizando un <span style="color:red">objeto dirección</span>
      tags:
        - Carrito
      operationId: Añade una nueva dirección
      parameters:
        - name: atencion_a
          in: query
          description: "Nombre de la persona que recibe la mercancía"
          required: true
          schema:
            type: string
        - name: calle
          in: query
          description: "Calle del domicilio de la dirección de entrega"
          required: true
          schema:
            type: string
        - name: colonia
          in: query
          description: "Colonia del domicilio de la dirección de entrega"
          required: true
          schema:
            type: string
        - name: num_ext
          in: query
          description: "Número exterior del domicilio de la dirección de entrega"
          required: true
          schema:
            type: integer
        - name: num_int
          in: query
          description: "Número interior del domicilio de la dirección de entrega"
          schema:
            type: string
        - name: codigo_postal
          in: query
          description: "Código postal del domicilio de la dirección de entrega"
          required: true
          schema:
            type: string
        - name: ciudad
          in: query
          description: "Ciudad del domicilio de la dirección de entrega"
          required: true
          schema:
            type: string
        - name: estado
          in: query
          description: "Estado del domicilio de la dirección de entrega (usar el parametro codigo_estado de la sección consultar estados)"
          required: true
          schema:
            type: string
        - name: pais
          in: query
          description: "País del domicilio de la dirección de entrega (usar el parametro codigo_pais de la sección consultar paises)"
          required: true
          schema:
            type: string
        - name: telefono
          in: query
          description: "Teléfono de la persona que recibe la mercancía"
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Obtener los datos de una dirección añadida
          content:
            aplication/json:
              example:
                - id: "1"
                  atencion_a: "ATENCION A"
                  calle: "CALLE"
                  num_ext: "123"
                  num_int: ""
                  colonia: "COLONIA"
                  codigo_postal: "CP"
                  pais: "PAIS"
                  estado: "ESTADO"
                  ciudad: "CIUDAD"
                  telefono: "123456"
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /carrito/direcciones/{id}:
    get:
      description: Obtiene una dirección guardada en la página de SYSCOM
      tags:
        - Carrito
      operationId: Obtener una dirección
      parameters:
        - name: id
          in: path
          description: "ID de la dirección solicitada"
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Obtener los datos de una dirección recibida
          content:
            aplication/json:
              example:
                - id: "1"
                  atencion_a: "ATENCION A"
                  calle: "CALLE"
                  num_ext: "123"
                  num_int: ""
                  colonia: "COLONIA"
                  codigo_postal: "CP"
                  pais: "PAIS"
                  estado: "ESTADO"
                  ciudad: "CIUDAD"
                  telefono: "123456"
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    put:
      description: Actualiza una dirección guardada en la página de SYSCOM
      tags:
        - Carrito
      operationId: Actualizar una dirección
      parameters:
        - name: id
          in: path
          description: "ID de la dirección solicitada"
          required: true
          schema:
            type: integer
        - name: atencion_a
          in: query
          description: "Nombre de la persona que recibe la mercancía"
          required: true
          schema:
            type: string
        - name: calle
          in: query
          description: "Calle del domicilio de la dirección de entrega"
          required: true
          schema:
            type: string
        - name: colonia
          in: query
          description: "Colonia del domicilio de la dirección de entrega"
          required: true
          schema:
            type: string
        - name: num_ext
          in: query
          description: "Número exterior del domicilio de la dirección de entrega"
          required: true
          schema:
            type: integer
        - name: num_int
          in: query
          description: "Número interior del domicilio de la dirección de entrega"
          schema:
            type: string
        - name: codigo_postal
          in: query
          description: "Código postal del domicilio de la dirección de entrega"
          required: true
          schema:
            type: string
        - name: ciudad
          in: query
          description: "Ciudad del domicilio de la dirección de entrega"
          required: true
          schema:
            type: string
        - name: estado
          in: query
          description: "Estado del domicilio de la dirección de entrega (usar el parametro codigo_estado de la sección consultar estados)"
          required: true
          schema:
            type: string
        - name: pais
          in: query
          description: "País del domicilio de la dirección de entrega (usar el parametro codigo_pais de la sección consultar paises)"
          required: true
          schema:
            type: string
        - name: telefono
          in: query
          description: "Teléfono de la persona que recibe la mercancía"
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Obtener los datos de una dirección actualizada
          content:
            aplication/json:
              example:
                - id: "1"
                  atencion_a: "ATENCION A"
                  calle: "CALLE"
                  num_ext: "123"
                  num_int: ""
                  colonia: "COLONIA"
                  codigo_postal: "CP"
                  pais: "PAIS"
                  estado: "ESTADO"
                  ciudad: "CIUDAD"
                  telefono: "123456"
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      description: Elimina una dirección guardada en la página de SYSCOM
      tags:
        - Carrito
      operationId: Eliminar una dirección
      parameters:
        - name: id
          in: path
          description: "ID de la dirección solicitada"
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Obtener el resultado de la eliminación
          content:
            aplication/json:
              example:
                - result: "true"
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /carrito/paises:
    get:
      description: Obtiene la lista de paises utilizados para una dirección
      tags:
        - Carrito
      operationId: Obtener paises
      responses:
        '200':
          description: Obtener la lista de los paises
          content:
            aplication/json:
              example:
                - paises: 
                    - codigo: "AFG"
                      id: "1"
                      nombre: "Afganistán"
                    - codigo: "ALB"
                      id: "2"
                      nombre: "Albania"
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /carrito/estados/{codigo_postal}:
    get:
      description: Obtiene obtiene el estado según el código postal
      tags:
        - Carrito
      operationId: Obtener estados
      parameters:
        - name: codigo_postal
          in: path
          description: "Código postal de la zona"
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Obtener l
          content:
            aplication/json:
              example:
                - codigo_postal: "31000"
                  municipio: "CHIHUAHUA"
                  estado_sat: "CHIH"
                  zona_extendida: "No"
                  estado_nombre: "CHIHUAHUA"
                  codigo_estado: "CHIH"
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /carrito/colonias/{codigo_postal}:
    get:
      description: Obtiene una lista de colonias utilizadas para una dirección
      tags:
        - Carrito
      operationId: Obtener colonias
      parameters:
        - name: codigo_postal
          in: path
          description: "Código postal de la zona"
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Obtener una lista de colonias validas según el código postal
          content:
            aplication/json:
              example:
                - "CENTRO"
                - "ZONA CENTRO"
                - "SAN PEDRO"
                - "SECTOR BOLíVAR"
                - "PARQUE ROTARIO"
                - "COLON"
                - "EL BAJO"
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /carrito/pago:
    get:
      description: Obtiene la lista de metodos de pago disponibles
      tags:
        - Carrito
      operationId: Obtener metodos de pago
      responses:
        '200':
          description: Obtener lista de metodos de pago disponible
          content:
            aplication/json:
              example:
                - nombre: "Transferencia"
                  metodo:
                    - transferencia:
                      - titulo: "Transferencia electrónica de fondos"
                        codigo: "03"
                        descuento: "4"
                        tipo_cambio: "preferencial"
                        plazo: 1
                        forma:
                          - pue: "1"
                            ppd: "2"
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /carrito/fleteras:
    get:
      description: Obtiene una lista con las paqueterías disponibles
      tags:
        - Carrito
      operationId: Obtener fleteras
      responses:
        '200':
          description: Obtener una lista con los datos de las paqueterías disponibles
          content:
            aplication/json:
              example:
                - codigo: "estafeta"
                  dia_siguiente: false
                  nombre: "Estafeta"
                - codigo: "estafeta_aereo"
                  dia_siguiente: true
                  nombre: "Estafeta día siguiente"
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /carrito/sucursales:
    get:
      description: Obtiene una lista con las sucursales disponibles
      tags:
        - Carrito
      operationId: Obtener sucursales
      responses:
        '200':
          description: Obtener una lista con las sucursales disponibles
          content:
            aplication/json:
              example:
                - nombre_sucursal: "Sucursal Cd. Juarez"
                  calle: "Sor Juana Inés de la Cruz"
                  num_ext: "169"
                  num_int: ""
                  codigo_postal: "32320"
                  colonia: "San Lorenzo"
                  estado: "Chihuahua"
                  ciudad: "Juarez"
                  pais: "México"
                  telefono: "(656)625-9221"
                  codigo: "cd_juarez"
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /carrito/cfdi:
    get:
      description: Obtiene la lista de CFDI permitidos para facturar
      tags:
        - Carrito
      operationId: Obtener CFDI
