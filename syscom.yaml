        Uno o más de los parámetros <span style="color:red">*anio*, *busqueda*</span> debe estar definido.
      operationId: Búsqueda de Facturas
      parameters:
        - name: anio
          in: query
          required: true
          description: Año de la búsqueda de las facturas en formato (yyyy) Ej. 2020
          schema:
            type: integer
        - name: busqueda
          in: query
          description:  Filtro de búsqueda de facturas
          schema:
            type: string
        - name: pagina
          in: query
          description: Página de busqueda de las facturas
          schema:
            type: integer
      tags:
        - Facturas  
        
  /facturas/{id}:
    get:
      description: |
        Uno o más de los parámetros <span style="color:red">*id*</span> debe estar definido.
      operationId: Detalle de Factura
      parameters:
        - name: id
          in: query
          required: true
          description: Folio de la factura de carga (FA20/XXXXXX)
          schema:
            type: string
      tags:
        - Facturas   
         
  /productos:
    get:
      description: |
        Uno o más de los parámetros <span style="color:red">*búsqueda*, *categorías*, *marcas*</span> debe estar definido.
      operationId: Búsqueda de productos
      parameters:
        - name: categoria
          in: query
          required: true
          description: ID de categoría o listado de IDs separados por comas ",".
          schema:
            type: string
        - name: marca
          in: query
          required: true
          description: ID de marcas o listado de marcas separados por comas ",".
          schema:
            type: string
        - name: busqueda
          in: query
          required: true
          description: Palabras clave de búsqueda separadas por el caracter "+".
          schema:
            type: string
        - name: sucursal
          in: query
          description: ID de sucursal o listado de sucursales separadas por comas ",".
          schema:
            type: string
        - name: orden
          in: query
          description: Orden en que se devolverá el listado, si se omite dirección se asume asc (precio = precio:asc).
          schema:
            type: string
            default: relevancia
            enum: [precio:asc, precio:desc, modelo:asc, modelo:desc, marca:asc, marca:desc, relevancia, topseller]
        - name: stock
          in: query
          schema:
            type: boolean
            default: 0
          allowEmptyValue: true
        - name: agrupar
          in: query
          schema:
            type: boolean
            default: 0
          allowEmptyValue: true
        - name: pagina
          in: query
          description: La página a buscar.
          schema:
            type: integer
            default: 1
      tags:
        - Productos
